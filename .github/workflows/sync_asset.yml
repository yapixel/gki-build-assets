name: Download and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y aria2 jq

      - name: Read toolchains.json
        id: config
        run: |
          echo "kernel_tag=$(jq -r '.manifest_tag' toolchains.json)" >> $GITHUB_OUTPUT
          echo "kernel_url=$(jq -r '.toolchains.kernel.url' toolchains.json)" >> $GITHUB_OUTPUT
          echo "clang_url=$(jq -r '.toolchains.clang.url' toolchains.json)" >> $GITHUB_OUTPUT
          echo "rust_url=$(jq -r '.toolchains.rust.url' toolchains.json)" >> $GITHUB_OUTPUT
          echo "tools_url=$(jq -r '.toolchains.clang_tools.url' toolchains.json)" >> $GITHUB_OUTPUT
          echo "clang_version=$(jq -r '.build_constants.clang_version' toolchains.json)" >> $GITHUB_OUTPUT

      - name: Download and upload clang
        run: |
          TAG="${{ steps.config.outputs.clang_version }}"
          gh release create "$TAG" --repo yapixel/gki-build-assets --title "$TAG" --notes "Toolchain" || true
          aria2c -s16 -x16 -k1M "${{ steps.config.outputs.clang_url }}" -o clang.tar.gz
          gh release upload "$TAG" clang.tar.gz --repo yapixel/gki-build-assets --clobber
          rm clang.tar.gz

      - name: Download and upload rust
        run: |
          TAG="${{ steps.config.outputs.clang_version }}"
          aria2c -s16 -x16 -k1M "${{ steps.config.outputs.rust_url }}" -o rust.tar.gz
          gh release upload "$TAG" rust.tar.gz --repo yapixel/gki-build-assets --clobber
          rm rust.tar.gz

      - name: Download and upload clang-tools
        run: |
          TAG="${{ steps.config.outputs.clang_version }}"
          aria2c -s16 -x16 -k1M "${{ steps.config.outputs.tools_url }}" -o clang-tools.tar.gz
          gh release upload "$TAG" clang-tools.tar.gz --repo yapixel/gki-build-assets --clobber
          rm clang-tools.tar.gz

      - name: Download and upload kernel
        run: |
          TAG="${{ steps.config.outputs.kernel_tag }}"
          gh release create "$TAG" --repo yapixel/gki-build-assets --title "$TAG" --notes "Kernel source" || true
          aria2c -s16 -x16 -k1M "${{ steps.config.outputs.kernel_url }}" -o kernel.tar.gz
          gh release upload "$TAG" kernel.tar.gz --repo yapixel/gki-build-assets --clobber
          rm kernel.tar.gz
