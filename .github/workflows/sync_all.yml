name: Parse Full Environment (Optimized)

on:
  workflow_dispatch:
    inputs:
      kernel_manifest_url:
        description: 'Kernel manifest URL'
        required: true
        type: string
        default: 'https://android.googlesource.com/kernel/manifest/+/refs/heads/common-android16-6.12-2025-06/default.xml?format=TEXT'
      clang_choice:
        description: 'Clang version to use'
        required: true
        type: choice
        options:
          - 'clang-r536225'
          - 'clang-r547379'
        default: 'clang-r547379'

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl git

      - name: Download Manifests
        id: download
        run: |
          download_manifest() {
            local url=$1
            local output=$2
            echo "Downloading $url..."
            curl -fsL --retry 5 --retry-delay 2 "$url" -o "${output}.base64"
            if [ -s "${output}.base64" ]; then
              base64 -d "${output}.base64" > "$output"
              echo "Successfully decoded $output"
            else
              echo "Error: Failed to download $output"
              exit 1
            fi
          }

          download_manifest "${{ github.event.inputs.kernel_manifest_url }}" "kernel_manifest.xml"

          declare -A clang_map=( ["clang-r536225"]="14043575" ["clang-r547379"]="13290119" )
          MANIFEST_ID=${clang_map[${{ github.event.inputs.clang_choice }}]}
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/refs/heads/main-kernel-2025/${{ github.event.inputs.clang_choice }}/manifest_${MANIFEST_ID}.xml?format=TEXT"
          
          download_manifest "$CLANG_URL" "clang_manifest.xml"
          echo "manifest_id=$MANIFEST_ID" >> $GITHUB_OUTPUT

      - name: Advanced Python Parsing & Validation
        id: python_parse
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import json
          import os
          import sys

          def parse_xml(file_path, target_paths):
              try:
                  tree = ET.parse(file_path)
                  root = tree.getroot()
                  default_rev = root.find('default').get('revision', '') if root.find('default') is not None else ''
                  
                  return {
                      p.get('path'): {
                          "name": p.get('name'),
                          "revision": p.get('revision') or default_rev,
                          "source": os.path.basename(file_path)
                      }
                      for p in root.findall('project') if p.get('path') in target_paths
                  }
              except Exception as e:
                  print(f"Error parsing {file_path}: {e}")
                  sys.exit(1)

          kernel_targets = {'common', 'prebuilts/rust', 'prebuilts/clang-tools'}
          clang_targets = {'prebuilts/clang/host/linux-x86', 'prebuilts/build-tools', 'toolchain/llvm-project'}
          
          k_data = parse_xml('kernel_manifest.xml', kernel_targets)
          c_data = parse_xml('clang_manifest.xml', clang_targets)

          with open('parsed_data.json', 'w') as f:
              json.dump({'kernel': k_data, 'clang': c_data}, f)
          EOF

      - name: Sync with build.config.constants
        id: constants
        run: |
          COMMON_REV=$(jq -r '.kernel["common"].revision' parsed_data.json)
          CONST_URL="https://android.googlesource.com/kernel/common/+/refs/heads/${COMMON_REV}/build.config.constants?format=TEXT"
          
          curl -fsL --retry 3 "$CONST_URL" | base64 -d > build.constants
          
          REQ_CLANG=$(grep "^CLANG_VERSION=" build.constants | cut -d'=' -f2 | tr -d '"')
          REQ_RUST=$(grep "^RUSTC_VERSION=" build.constants | cut -d'=' -f2 | tr -d '"')
          
          echo "Required Clang: $REQ_CLANG"
          echo "Selected Clang: ${{ github.event.inputs.clang_choice }}"

          echo "req_clang=$REQ_CLANG" >> $GITHUB_OUTPUT
          echo "req_rust=$REQ_RUST" >> $GITHUB_OUTPUT

      - name: Resolve Hashes and Latest Tag
        id: resolve
        run: |
          get_hash() {
            local repo=$1
            local rev=$2
            if [[ "$rev" =~ ^[0-9a-f]{40}$ ]]; then
              echo "$rev"
            else
              git ls-remote "https://android.googlesource.com/${repo}" "$rev" | cut -f1 | head -1
            fi
          }
          
          CLANG_TOOLS_NAME=$(jq -r '.kernel["prebuilts/clang-tools"].name' parsed_data.json)
          CLANG_TOOLS_REV=$(jq -r '.kernel["prebuilts/clang-tools"].revision' parsed_data.json)
          CLANG_TOOLS_HASH=$(get_hash "$CLANG_TOOLS_NAME" "$CLANG_TOOLS_REV")
          echo "clang_tools_hash=${CLANG_TOOLS_HASH}" >> $GITHUB_OUTPUT
          
          RUST_NAME=$(jq -r '.kernel["prebuilts/rust"].name' parsed_data.json)
          RUST_REV=$(jq -r '.kernel["prebuilts/rust"].revision' parsed_data.json)
          RUST_HASH=$(get_hash "$RUST_NAME" "$RUST_REV")
          echo "rust_hash=${RUST_HASH}" >> $GITHUB_OUTPUT
          
          COMMON_NAME=$(jq -r '.kernel["common"].name' parsed_data.json)
          COMMON_REV=$(jq -r '.kernel["common"].revision' parsed_data.json)
          COMMON_HASH=$(get_hash "$COMMON_NAME" "$COMMON_REV")
          echo "common_hash=${COMMON_HASH}" >> $GITHUB_OUTPUT
          
          curl -fsL "https://android.googlesource.com/${COMMON_NAME}/+refs?format=JSON" | sed '1d' > common_refs.json
          
          COMMON_TAG=$(python3 << 'PYEOF'
          import json
          
          with open('common_refs.json', 'r') as f:
              data = json.load(f)
          
          tags = []
          for ref in data.keys():
              if 'refs/tags/android16-6.12-2025-06_r' in ref:
                  r_num = int(ref.split('_r')[-1])
                  tags.append((r_num, ref.replace('refs/tags/', '')))
          
          if tags:
              tags.sort(key=lambda x: x[0], reverse=True)
              print(tags[0][1])
          else:
              print("unknown")
          PYEOF
          )
          echo "common_tag=${COMMON_TAG}" >> $GITHUB_OUTPUT

      - name: Generate Final JSON
        run: |
          MANIFEST_ID="${{ steps.download.outputs.manifest_id }}"
          OUTPUT_FILE="env-${MANIFEST_ID}.json"
          
          python3 << EOF
          import json
          import os
          
          manifest_id = "${MANIFEST_ID}"
          
          with open('parsed_data.json', 'r') as f:
              data = json.load(f)
          
          clang_ver = "${{ steps.download.outputs.clang_choice || github.event.inputs.clang_choice }}"
          common_tag = "${{ steps.resolve.outputs.common_tag }}"
          common_name = data['kernel']['common']['name']
          
          env_config = {
              "environment": manifest_id,
              "last_update": os.popen('date -u +"%Y-%m-%dT%H:%M:%SZ"').read().strip(),
              "kernel": {
                  "branch": data['kernel']['common']['revision'],
                  "rust_version": "${{ steps.constants.outputs.req_rust }}",
                  "clang_version": "${{ steps.constants.outputs.req_clang }}"
              },
              "components": {},
              "clang_toolchain": {
                  "version": clang_ver,
                  "manifest": manifest_id
              }
          }
          
          for path, info in data['kernel'].items():
              env_config["components"][path] = {
                  "name": info["name"],
                  "revision": "${{ steps.resolve.outputs.common_hash }}" if path == "common" else "${{ steps.resolve.outputs.rust_hash }}" if path == "prebuilts/rust" else "${{ steps.resolve.outputs.clang_tools_hash }}",
                  "original_branch": info["revision"],
                  "source": info["source"]
              }
              if path == "common":
                  env_config["components"][path]["tag"] = common_tag
                  env_config["components"][path]["download_url"] = f"https://android.googlesource.com/{common_name}/+archive/refs/tags/{common_tag}.tar.gz"
          
          for path, info in data['clang'].items():
              env_config["components"][path] = {
                  "name": info["name"],
                  "revision": info["revision"],
                  "source": info["source"]
              }
          
          with open(f'env-{manifest_id}.json', 'w') as f:
              json.dump(env_config, f, indent=2)
          
          print(f"Generated env-{manifest_id}.json")
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add env-*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update build environment: ${{ github.event.inputs.clang_choice }}"
          git push origin HEAD
