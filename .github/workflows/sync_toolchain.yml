name: Download and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download raw toolchains artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-toolchains
          run-id: ${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read raw toolchains
        id: raw
        run: |
          KERNEL_REV=$(jq -r '.kernel_revision' raw-toolchains.json)
          KERNEL_URL=$(jq -r '.kernel_url' raw-toolchains.json)
          CLANG_URL=$(jq -r '.clang_url' raw-toolchains.json)
          RUST_URL=$(jq -r '.rust_url' raw-toolchains.json)
          TOOLS_URL=$(jq -r '.clang_tools_url' raw-toolchains.json)
          
          echo "kernel_rev=${KERNEL_REV}" >> $GITHUB_OUTPUT
          echo "kernel_url=${KERNEL_URL}" >> $GITHUB_OUTPUT
          echo "clang_url=${CLANG_URL}" >> $GITHUB_OUTPUT
          echo "rust_url=${RUST_URL}" >> $GITHUB_OUTPUT
          echo "tools_url=${TOOLS_URL}" >> $GITHUB_OUTPUT

      - name: Download kernel source
        run: |
          echo "Downloading kernel from: ${{ steps.raw.outputs.kernel_url }}"
          aria2c -s16 -x16 -k1M "${{ steps.raw.outputs.kernel_url }}" -o kernel.tar.gz
          if [ ! -s kernel.tar.gz ]; then
            echo "Error: Failed to download kernel"
            exit 1
          fi

      - name: Download clang
        run: |
          echo "Downloading clang from: ${{ steps.raw.outputs.clang_url }}"
          aria2c -s16 -x16 -k1M "${{ steps.raw.outputs.clang_url }}" -o clang.tar.gz
          if [ ! -s clang.tar.gz ]; then
            echo "Error: Failed to download clang"
            exit 1
          fi

      - name: Download rust
        run: |
          echo "Downloading rust from: ${{ steps.raw.outputs.rust_url }}"
          aria2c -s16 -x16 -k1M "${{ steps.raw.outputs.rust_url }}" -o rust.tar.gz
          if [ ! -s rust.tar.gz ]; then
            echo "Error: Failed to download rust"
            exit 1
          fi

      - name: Download clang-tools
        run: |
          echo "Downloading clang-tools from: ${{ steps.raw.outputs.tools_url }}"
          aria2c -s16 -x16 -k1M "${{ steps.raw.outputs.tools_url }}" -o clang-tools.tar.gz
          if [ ! -s clang-tools.tar.gz ]; then
            echo "Error: Failed to download clang-tools"
            exit 1
          fi

      - name: Extract clang version
        id: clang_version
        run: |
          mkdir -p /tmp/clang_extract
          tar -xzf clang.tar.gz -C /tmp/clang_extract --wildcards '*/bin/clang' --strip-components=2 2>/dev/null
          chmod +x /tmp/clang_extract/clang
          
          CLANG_VER=$(/tmp/clang_extract/clang --version 2>/dev/null | grep -oP 'based on \Kr[0-9]+' | head -1)
          
          if [ -z "$CLANG_VER" ]; then
            echo "Error: Failed to extract clang version"
            exit 1
          fi
          
          echo "clang_version=${CLANG_VER}" >> $GITHUB_OUTPUT
          echo "Clang version: ${CLANG_VER}"
          
          rm -rf /tmp/clang_extract

      - name: Create toolchain release
        run: |
          TOOLCHAIN_TAG="${{ steps.clang_version.outputs.clang_version }}"
          
          if gh release view "$TOOLCHAIN_TAG" -R yapixel/gki-build-assets &>/dev/null; then
            echo "Release $TOOLCHAIN_TAG already exists, deleting..."
            gh release delete "$TOOLCHAIN_TAG" -R yapixel/gki-build-assets --yes
          fi
          
          echo "Creating toolchain release: $TOOLCHAIN_TAG"
          gh release create "$TOOLCHAIN_TAG" \
            --repo yapixel/gki-build-assets \
            --title "$TOOLCHAIN_TAG" \
            --notes "Clang toolchain for $TOOLCHAIN_TAG"
          
          echo "Uploading clang.tar.gz..."
          gh release upload "$TOOLCHAIN_TAG" \
            clang.tar.gz \
            --repo yapixel/gki-build-assets \
            --clobber
          
          echo "Uploading rust.tar.gz..."
          gh release upload "$TOOLCHAIN_TAG" \
            rust.tar.gz \
            --repo yapixel/gki-build-assets \
            --clobber
          
          echo "Uploading clang-tools.tar.gz..."
          gh release upload "$TOOLCHAIN_TAG" \
            clang-tools.tar.gz \
            --repo yapixel/gki-build-assets \
            --clobber
          
          echo "toolchain_tag=${TOOLCHAIN_TAG}" >> $GITHUB_OUTPUT

      - name: Generate final toolchains.json
        run: |
          KERNEL_TAG="${{ steps.raw.outputs.kernel_rev }}"
          TOOLCHAIN_TAG="${{ steps.clang_version.outputs.clang_version }}"
          BASE_URL="https://github.com/yapixel/gki-build-assets/releases/download"
          
          cat > toolchains.json << EOF
          {
            "kernel": "${BASE_URL}/${KERNEL_TAG}/kernel.tar.gz",
            "clang": "${BASE_URL}/${TOOLCHAIN_TAG}/clang.tar.gz",
            "rust": "${BASE_URL}/${TOOLCHAIN_TAG}/rust.tar.gz",
            "clang_tools": "${BASE_URL}/${TOOLCHAIN_TAG}/clang-tools.tar.gz"
          }
          EOF
          
          echo "Generated toolchains.json:"
          cat toolchains.json

      - name: Create kernel release
        run: |
          KERNEL_TAG="${{ steps.raw.outputs.kernel_rev }}"
          
          if gh release view "$KERNEL_TAG" -R yapixel/gki-build-assets &>/dev/null; then
            echo "Release $KERNEL_TAG already exists, deleting..."
            gh release delete "$KERNEL_TAG" -R yapixel/gki-build-assets --yes
          fi
          
          echo "Creating kernel release: $KERNEL_TAG"
          gh release create "$KERNEL_TAG" \
            --repo yapixel/gki-build-assets \
            --title "$KERNEL_TAG" \
            --notes "Kernel source for $KERNEL_TAG"
          
          echo "Uploading kernel.tar.gz..."
          gh release upload "$KERNEL_TAG" \
            kernel.tar.gz \
            --repo yapixel/gki-build-assets \
            --clobber
          
          echo "Uploading toolchains.json..."
          gh release upload "$KERNEL_TAG" \
            toolchains.json \
            --repo yapixel/gki-build-assets \
            --clobber

      - name: Cleanup
        if: always()
        run: |
          rm -f kernel.tar.gz clang.tar.gz rust.tar.gz clang-tools.tar.gz raw-toolchains.json toolchains.json
          rm -rf /tmp/clang_extract
