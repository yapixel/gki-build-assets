name: Parse Manifest

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: 'Manifest Branch'
        required: true
        default: 'common-android16-6.12-2025-06'

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Download Manifest
        run: |
          TAG="${{ inputs.manifest_branch }}"
          URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/${TAG}/default.xml?format=TEXT"
          curl -fsL --retry 5 "$URL" | base64 -d > manifest.xml

      - name: Comprehensive Logic Parse
        id: resolve
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os, requests, base64, re

          # 1. 解析 XML 基础信息
          tree = ET.parse('manifest.xml')
          root = tree.getroot()
          default_rev = root.find('default').get('revision', '')

          projects = {}
          targets = {
              "common": "kernel",
              "prebuilts/clang/host/linux-x86": "clang",
              "prebuilts/rust": "rust",
              "prebuilts/clang-tools": "tools"
          }

          for proj in root.findall('project'):
              path = proj.get('path')
              if path in targets:
                  projects[targets[path]] = {
                      "name": proj.get('name'),
                      "rev": proj.get('revision') or default_rev
                  }

          def fetch_text(repo, rev, path=""):
              url = f"https://android.googlesource.com/{repo}/+/{rev}/{path}?format=TEXT"
              try:
                  r = requests.get(url, timeout=10)
                  return base64.b64decode(r.text).decode('utf-8')
              except: return ""

          results = {}

          # 2. 准确提取内核版本 (Makefile)
          k = projects['kernel']
          mk = fetch_text(k['name'], k['rev'], "Makefile")
          v = re.search(r'^VERSION\s*=\s*(\d+)', mk, re.M).group(1)
          p = re.search(r'^PATCHLEVEL\s*=\s*(\d+)', mk, re.M).group(1)
          s = re.search(r'^SUBLEVEL\s*=\s*(\d+)', mk, re.M).group(1)
          results['kernel_version'] = f"{v}.{p}.{s}"
          results['kernel_hash'] = k['rev']

          # 3. 准确提取 Clang 版本 (Commit Message)
          c = projects['clang']
          c_info = fetch_text(c['name'], c['rev']) # 获取提交详情
          c_ver = re.search(r'r\d+[a-z]?', c_info).group(0)
          results['clang_version'] = c_ver
          results['clang_hash'] = c['rev']

          # 4. 准确提取 Rust 版本 (目录探测)
          # 关键：我们去那个特定的 Hash 下面看 linux-x86 目录里到底有什么
          r_proj = projects['rust']
          ls_tree = fetch_text(r_proj['name'], r_proj['rev'], "linux-x86/")
          # 解析 git ls-tree 格式的文本，提取目录名
          # 格式通常为: 040000 tree <hash>    1.81.0
          found_versions = re.findall(r'(\d+\.\d+\.\d+)', ls_tree)
          
          # 逻辑：如果存在多个，选最大的；如果没有，报错或兜底
          if found_versions:
              # 排除 stable 等软链接，只取纯数字版本
              real_versions = sorted(found_versions, key=lambda x: [int(i) for i in x.split('.')])
              rust_ver = real_versions[-1] 
          else:
              rust_ver = "1.81.0" # 极低概率下的兜底
          
          results['rust_version'] = rust_ver
          results['rust_hash'] = r_proj['rev']
          results['tools_hash'] = projects['tools']['rev']

          # 5. 输出到 GITHUB_OUTPUT 和 JSON
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              for key, val in results.items():
                  f.write(f"{key}={val}\n")

          # 写入 JSON
          import json
          data = {
              "manifest_tag": "${{ inputs.manifest_branch }}",
              "kernel_version": results['kernel_version'],
              "clang_version": results['clang_version'],
              "rust_version": results['rust_version'],
              "kernel": { "revision": results['kernel_hash'], "url": f"https://android.googlesource.com/{projects['kernel']['name']}/+archive/{results['kernel_hash']}.tar.gz" },
              "clang": { "revision": results['clang_hash'], "url": f"https://android.googlesource.com/{projects['clang']['name']}/+archive/{results['clang_hash']}.tar.gz" },
              "rust": { "revision": results['rust_hash'], "url": f"https://android.googlesource.com/{projects['rust']['name']}/+archive/{results['rust_hash']}/linux-x86/{results['rust_version']}.tar.gz" },
              "clang_tools": { "revision": results['tools_hash'], "url": f"https://android.googlesource.com/{projects['tools']['name']}/+archive/{results['tools_hash']}/linux-x86/bin.tar.gz" }
          }
          with open('toolchains.json', 'w') as f:
              json.dump(data, f, indent=2)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-config
          path: toolchains.json
