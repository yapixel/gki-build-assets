name: Parse Manifest

on:
  workflow_dispatch:
    inputs:
      kernel_tag:
        description: 'Manifest Branch'
        required: true
        type: string
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Parse Manifest
        id: manifest
        run: |
          TAG="${{ inputs.kernel_tag }}"
          URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/${TAG}/default.xml?format=TEXT"
          
          curl -fsL --retry 5 "$URL" | base64 -d > manifest.xml
          
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import os

          tree = ET.parse('manifest.xml')
          root = tree.getroot()
          default_rev = root.find('default').get('revision', '') if root.find('default') is not None else ""
          
          def set_out(name, val):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"{name}={val}\n")

          targets = {
              "common": "kernel",
              "prebuilts/clang/host/linux-x86": "clang",
              "prebuilts/rust": "rust",
              "prebuilts/clang-tools": "tools"
          }

          for proj in root.findall('project'):
              path = proj.get('path')
              if path in targets:
                  key = targets[path]
                  set_out(f"{key}_name", proj.get('name'))
                  set_out(f"{key}_rev", proj.get('revision') or default_rev)
          EOF

      - name: Resolve Hashes and Version
        id: resolve
        run: |
          get_hash() {
            git ls-remote "https://android.googlesource.com/$1" "$2" | cut -f1 | head -1
          }

          # 获取各组件 hash
          K_REV="${{ steps.manifest.outputs.kernel_rev }}"
          K_NAME="${{ steps.manifest.outputs.kernel_name }}"
          K_HASH=$(get_hash "$K_NAME" "$K_REV")
          
          C_NAME="${{ steps.manifest.outputs.clang_name }}"
          C_REV="${{ steps.manifest.outputs.clang_rev }}"
          C_HASH=$(get_hash "$C_NAME" "$C_REV")
          
          R_NAME="${{ steps.manifest.outputs.rust_name }}"
          R_REV="${{ steps.manifest.outputs.rust_rev }}"
          R_HASH=$(get_hash "$R_NAME" "$R_REV")
          
          T_NAME="${{ steps.manifest.outputs.tools_name }}"
          T_REV="${{ steps.manifest.outputs.tools_rev }}"
          T_HASH=$(get_hash "$T_NAME" "$T_REV")

          # 通过 CLANG_REVISIONS.json 获取 clang 版本号
          CLANG_JSON_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/refs/heads/main/CLANG_REVISIONS.json?format=TEXT"
          curl -fsL --retry 5 "$CLANG_JSON_URL" | base64 -d > clang_revisions.json
          C_VER=$(jq -r --arg hash "$C_HASH" '.[$hash].version' clang_revisions.json)
          
          # 获取内核版本号
          echo "Fetching Makefile content..."
          curl -fsL "https://android.googlesource.com/$K_NAME/+/$K_HASH/Makefile?format=TEXT" | base64 -d > Makefile.tmp
          
          V=$(grep "^VERSION =" Makefile.tmp | awk '{print $3}')
          P=$(grep "^PATCHLEVEL =" Makefile.tmp | awk '{print $3}')
          S=$(grep "^SUBLEVEL =" Makefile.tmp | awk '{print $3}')
          [ -z "$S" ] && S="0"
          
          echo "kernel_full_version=$V.$P.$S" >> $GITHUB_OUTPUT
          echo "kernel_hash=$K_HASH" >> $GITHUB_OUTPUT
          echo "clang_hash=$C_HASH" >> $GITHUB_OUTPUT
          echo "clang_version=$C_VER" >> $GITHUB_OUTPUT
          echo "rust_hash=$R_HASH" >> $GITHUB_OUTPUT
          echo "tools_hash=$T_HASH" >> $GITHUB_OUTPUT

      - name: Generate toolchains.json
        run: |
          cat <<EOF > toolchains.json
          {
            "kernel_tag": "${{ inputs.kernel_tag }}",
            "kernel_version": "${{ steps.resolve.outputs.kernel_full_version }}",
            "last_update": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "kernel": {
              "revision": "${{ steps.resolve.outputs.kernel_hash }}",
              "url": "https://android.googlesource.com/${{ steps.manifest.outputs.kernel_name }}/+archive/${{ steps.resolve.outputs.kernel_hash }}.tar.gz"
            },
            "clang": {
              "revision": "${{ steps.resolve.outputs.clang_hash }}",
              "version": "${{ steps.resolve.outputs.clang_version }}",
              "url": "https://android.googlesource.com/${{ steps.manifest.outputs.clang_name }}/+archive/${{ steps.resolve.outputs.clang_hash }}.tar.gz"
            },
            "rust": {
              "revision": "${{ steps.resolve.outputs.rust_hash }}",
              "url": "https://android.googlesource.com/${{ steps.manifest.outputs.rust_name }}/+archive/${{ steps.resolve.outputs.rust_hash }}/linux-x86/1.81.0.tar.gz"
            },
            "clang_tools": {
              "revision": "${{ steps.resolve.outputs.tools_hash }}",
              "url": "https://android.googlesource.com/${{ steps.manifest.outputs.tools_name }}/+archive/${{ steps.resolve.outputs.tools_hash }}/linux-x86/bin.tar.gz"
            }
          }
          EOF
          cat toolchains.json

      - name: Commit and push toolchains.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add toolchains.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update toolchains.json for ${{ inputs.kernel_tag }}"
          git push
