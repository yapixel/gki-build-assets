name: Parse Manifest

on:
  workflow_dispatch:
    inputs:
      kernel_revision:
        description: 'Kernel revision'
        required: true
        type: string
        default: 'android16-6.12-2025-06'

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet

      - name: Download and parse Manifest
        id: manifest
        run: |
          KERNEL_REV="${{ inputs.kernel_revision }}"
          MANIFEST_URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/${KERNEL_REV}/default.xml?format=TEXT"
          
          echo "Downloading manifest from: $MANIFEST_URL"
          curl -fsL --retry 5 "$MANIFEST_URL" | base64 -d > manifest.xml
          
          if ! head -1 manifest.xml | grep -q "<?xml"; then
            echo "Error: Invalid manifest downloaded"
            exit 1
          fi
          
          # 提取内核 revision
          KERNEL_REVISION=$(xmlstarlet sel -t -v "//project[@path='common']/@revision" manifest.xml)
          echo "kernel_revision=${KERNEL_REVISION}" >> $GITHUB_OUTPUT
          
          # 获取 default revision
          DEFAULT_REV=$(xmlstarlet sel -t -v "//default/@revision" manifest.xml)
          
          # 获取 clang 仓库信息
          CLANG_NAME=$(xmlstarlet sel -t -v "//project[@path='prebuilts/clang/host/linux-x86']/@name" manifest.xml)
          CLANG_REV=$(xmlstarlet sel -t -v "//project[@path='prebuilts/clang/host/linux-x86']/@revision" manifest.xml)
          [ -z "$CLANG_REV" ] && CLANG_REV="$DEFAULT_REV"
          echo "clang_name=${CLANG_NAME}" >> $GITHUB_OUTPUT
          echo "clang_rev=${CLANG_REV}" >> $GITHUB_OUTPUT
          
          # 获取 rust 仓库信息
          RUST_NAME=$(xmlstarlet sel -t -v "//project[@path='prebuilts/rust']/@name" manifest.xml)
          RUST_REV=$(xmlstarlet sel -t -v "//project[@path='prebuilts/rust']/@revision" manifest.xml)
          [ -z "$RUST_REV" ] && RUST_REV="$DEFAULT_REV"
          echo "rust_name=${RUST_NAME}" >> $GITHUB_OUTPUT
          echo "rust_rev=${RUST_REV}" >> $GITHUB_OUTPUT
          
          # 获取 clang-tools 仓库信息
          TOOLS_NAME=$(xmlstarlet sel -t -v "//project[@path='prebuilts/clang-tools']/@name" manifest.xml)
          TOOLS_REV=$(xmlstarlet sel -t -v "//project[@path='prebuilts/clang-tools']/@revision" manifest.xml)
          [ -z "$TOOLS_REV" ] && TOOLS_REV="$DEFAULT_REV"
          echo "tools_name=${TOOLS_NAME}" >> $GITHUB_OUTPUT
          echo "tools_rev=${TOOLS_REV}" >> $GITHUB_OUTPUT

      - name: Convert branches to commit hashes
        id: hashes
        run: |
          get_hash() {
            local repo=$1
            local rev=$2
            if [[ "$rev" =~ ^[0-9a-f]{40}$ ]]; then
              echo "$rev"
            else
              git ls-remote "https://android.googlesource.com/${repo}" "$rev" | cut -f1 | head -1
            fi
          }
          
          CLANG_HASH=$(get_hash "${{ steps.manifest.outputs.clang_name }}" "${{ steps.manifest.outputs.clang_rev }}")
          RUST_HASH=$(get_hash "${{ steps.manifest.outputs.rust_name }}" "${{ steps.manifest.outputs.rust_rev }}")
          TOOLS_HASH=$(get_hash "${{ steps.manifest.outputs.tools_name }}" "${{ steps.manifest.outputs.tools_rev }}")
          
          echo "clang_hash=${CLANG_HASH}" >> $GITHUB_OUTPUT
          echo "rust_hash=${RUST_HASH}" >> $GITHUB_OUTPUT
          echo "tools_hash=${TOOLS_HASH}" >> $GITHUB_OUTPUT

      - name: Generate raw toolchains.json
        run: |
          KERNEL_REV="${{ steps.manifest.outputs.kernel_revision }}"
          KERNEL_URL="https://android.googlesource.com/kernel/common/+archive/${KERNEL_REV}.tar.gz"
          
          CLANG_URL="https://android.googlesource.com/${{ steps.manifest.outputs.clang_name }}/+archive/${{ steps.hashes.outputs.clang_hash }}.tar.gz"
          RUST_URL="https://android.googlesource.com/${{ steps.manifest.outputs.rust_name }}/+archive/${{ steps.hashes.outputs.rust_hash }}.tar.gz"
          TOOLS_URL="https://android.googlesource.com/${{ steps.manifest.outputs.tools_name }}/+archive/${{ steps.hashes.outputs.tools_hash }}/linux-x86/bin.tar.gz"
          
          cat > raw-toolchains.json << EOF
          {
            "kernel_revision": "${KERNEL_REV}",
            "kernel_url": "${KERNEL_URL}",
            "clang_url": "${CLANG_URL}",
            "rust_url": "${RUST_URL}",
            "clang_tools_url": "${TOOLS_URL}"
          }
          EOF
          
          echo "Generated raw-toolchains.json:"
          cat raw-toolchains.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-toolchains
          path: raw-toolchains.json
