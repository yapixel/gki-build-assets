name: Deterministic Toolchain Sync

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: 'Manifest Branch'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install requests

      - name: Resolve and Map Toolchains
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os, requests, base64, re, json, subprocess

          # --- 核心工具函数 ---
          def get_static_hash(repo, rev):
              """将动态分支名转化为 40 位死哈希"""
              url = f"https://android.googlesource.com/{repo}"
              try:
                  out = subprocess.check_output(["git", "ls-remote", url, rev]).decode()
                  return out.split()[0]
              except: return rev

          def fetch_raw_text(repo, rev, path):
              """直接从 Google Git 物理寻址读取文本文件"""
              url = f"https://android.googlesource.com/{repo}/+/{rev}/{path}?format=TEXT"
              r = requests.get(url, timeout=15)
              if r.status_code == 200:
                  return base64.b64decode(r.text).decode('utf-8', errors='ignore')
              return ""

          # --- 步骤 1: 解析 XML 锁定哈希 ---
          tag = "${{ inputs.manifest_branch }}"
          manifest_url = f"https://android.googlesource.com/kernel/manifest/+/refs/heads/{tag}/default.xml?format=TEXT"
          manifest_raw = base64.b64decode(requests.get(manifest_url).text).decode()
          root = ET.fromstring(manifest_raw)
          
          default_rev = root.find('default').get('revision')
          mapping = {
              "common": "kernel",
              "prebuilts/clang/host/linux-x86": "clang",
              "prebuilts/rust": "rust",
              "prebuilts/clang-tools": "tools"
          }
          
          projects = {}
          for proj in root.findall('project'):
              path = proj.get('path')
              if path in mapping:
                  name = proj.get('name')
                  rev = proj.get('revision') or default_rev
                  projects[mapping[path]] = {
                      "name": name,
                      "hash": get_static_hash(name, rev)
                  }

          # --- 步骤 2: 从内核源码中读取“真理契约” ---
          k = projects['kernel']
          # 读取 build.config.constants 
          constants = fetch_raw_text(k['name'], k['hash'], "build.config.constants")
          
          # 提取版本号 (绝对不猜)
          clang_ver = re.search(r'CLANG_VERSION=([^\s]+)', constants).group(1)
          rust_ver = re.search(r'RUSTC_VERSION=([^\s]+)', constants).group(1)
          
          # 从 Makefile 提取内核版本
          makefile = fetch_raw_text(k['name'], k['hash'], "Makefile")
          k_ver = ".".join([re.search(f'^{v}\\s*=\\s*(\\d+)', makefile, re.M).group(1) for v in ["VERSION", "PATCHLEVEL", "SUBLEVEL"]])

          # --- 步骤 3: 组装物理链接 ---
          # 只有 clang-tools 不需要版本号变量，它是哈希驱动的扁平结构
          t = projects['tools']
          
          final_json = {
              "manifest_tag": tag,
              "kernel_version": k_ver,
              "build_constants": {
                  "clang_version": clang_ver,
                  "rust_version": rust_ver
              },
              "kernel": {
                  "revision": k['hash'],
                  "url": f"https://android.googlesource.com/{k['name']}/+archive/{k['hash']}.tar.gz"
              },
              "clang": {
                  "revision": projects['clang']['hash'],
                  "url": f"https://android.googlesource.com/{projects['clang']['name']}/+archive/{projects['clang']['hash']}/clang-{clang_ver}.tar.gz"
              },
              "rust": {
                  "revision": projects['rust']['hash'],
                  "url": f"https://android.googlesource.com/{projects['rust']['name']}/+archive/{projects['rust']['hash']}/linux-x86/{rust_ver}.tar.gz"
              },
              "clang_tools": {
                  "revision": t['hash'],
                  "url": f"https://android.googlesource.com/{t['name']}/+archive/{t['hash']}/linux-x86/bin.tar.gz"
              }
          }

          with open('toolchains.json', 'w') as f:
              json.dump(final_json, f, indent=2)

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add toolchains.json
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "Sync toolchains: ${{ inputs.manifest_branch }} (Verified Constants)"
            git push
          fi
