name: Sync Android 16 Toolchain

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Verify Manifest
        run: |
          URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/common-android16-6.12-2025-06/default.xml?format=TEXT"
          curl -fsL --retry 5 "$URL" | base64 -d > manifest.xml
          if [[ $(head -c 5 manifest.xml) != "<?xml" ]]; then
            echo "错误: 下载内容非法。"
            exit 1
          fi

      - name: Parse and Resolve Hashes
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import json
          import os
          import subprocess

          def get_commit_hash(repo_name, revision):
              # 如果已经是 hash 则直接返回
              if len(revision) == 40 and all(c in '0123456789abcdef' for c in revision.lower()):
                  return revision
              
              # 如果是分支名，利用 git ls-remote 联网获取当前的 Hash
              print(f"正在获取 {repo_name} 分支 {revision} 的最新 Hash...")
              repo_url = f"https://android.googlesource.com/{repo_name}"
              try:
                  output = subprocess.check_output(['git', 'ls-remote', repo_url, revision]).decode()
                  if output:
                      return output.split()[0]
              except:
                  pass
              return revision

          def generate_json():
              tree = ET.parse('manifest.xml')
              root = tree.getroot()

              default_tag = root.find('default')
              global_rev = default_tag.get('revision') if default_tag is not None else None

              config = {
                  "version_tag": "common-android16-6.12-2025-06",
                  "last_sync": os.popen('date -u +"%Y-%m-%dT%H:%M:%SZ"').read().strip(),
                  "toolchains": {}
              }

              target_paths = {
                  "prebuilts/clang/host/linux-x86": "clang",
                  "prebuilts/clang-tools": "clang_tools",
                  "prebuilts/rust": "rust"
              }

              for project in root.findall('project'):
                  path = project.get('path')
                  if path in target_paths:
                      key = target_paths[path]
                      name = project.get('name')
                      
                      # 1. 提取初步 revision (可能是分支名)
                      raw_rev = project.get('revision') or global_rev
                      
                      # 2. 核心：将分支名转换为 Commit Hash
                      revision = get_commit_hash(name, raw_rev)
                      
                      git_base = f"https://android.googlesource.com/{name}"
                      
                      if key == "clang":
                          final_url = f"{git_base}/+archive/{revision}.tar.gz"
                      elif key == "clang_tools":
                          final_url = f"{git_base}/+archive/{revision}/linux-x86/bin.tar.gz"
                      elif key == "rust":
                          final_url = f"{git_base}/+archive/{revision}/linux-x86/1.81.0.tar.gz"

                      config["toolchains"][key] = {
                          "revision": revision,
                          "url": final_url,
                          "source_repo": name,
                          "original_branch": raw_rev if raw_rev != revision else None
                      }

              with open('toolchain.json', 'w', encoding='utf-8') as f:
                  json.dump(config, f, indent=2, ensure_ascii=False)
              
              print("JSON 生成完成，已锁定 Commit Hashes。")

          if __name__ == "__main__":
              generate_json()

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain toolchain.json)" ]]; then
            git add toolchain.json
            git commit -m "chore: 锁定工具链具体 Commit Hashes"
            git push
          fi

      - name: Cleanup
        if: always()
        run: rm -f manifest.xml
