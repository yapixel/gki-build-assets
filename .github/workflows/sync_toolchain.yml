name: Sync Android 16 Toolchain

on:
  workflow_dispatch: # 手动触发
  schedule:
    - cron: '0 0 * * 0' # 每周日自动执行

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Verify Manifest
        run: |
          # 锁定 2025-06 分支
          URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/common-android16-6.12-2025-06/default.xml?format=TEXT"
          
          echo "正在从 Google Git 下载 Manifest..."
          if ! curl -fsL --retry 5 "$URL" | base64 -d > manifest.xml; then
            echo "错误: 下载或解码失败。"
            exit 1
          fi

          if [[ $(head -c 5 manifest.xml) != "<?xml" ]]; then
            echo "错误: 下载内容非法（非 XML 格式）。"
            cat manifest.xml | head -n 20
            exit 1
          fi

      - name: Parse Manifest and Generate JSON
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import json
          import os

          def generate_json():
              manifest_file = 'manifest.xml'
              tree = ET.parse(manifest_file)
              root = tree.getroot()

              # 核心：获取全局默认 Revision，防止 project 标签内缺失该属性
              default_tag = root.find('default')
              global_rev = default_tag.get('revision') if default_tag is not None else None
              print(f"检测到全局默认 Revision: {global_rev}")

              config = {
                  "version_tag": "common-android16-6.12-2025-06",
                  "last_sync": os.popen('date -u +"%Y-%m-%dT%H:%M:%SZ"').read().strip(),
                  "toolchains": {}
              }

              # 定义需要抓取的路径
              target_paths = {
                  "prebuilts/clang/host/linux-x86": "clang",
                  "prebuilts/clang-tools": "clang_tools",
                  "prebuilts/rust": "rust"
              }

              for project in root.findall('project'):
                  path = project.get('path')
                  if path in target_paths:
                      key = target_paths[path]
                      name = project.get('name')
                      
                      # 优先级：项目自身 revision > 全局默认 revision
                      revision = project.get('revision') or global_rev
                      
                      if not revision:
                          print(f"跳过 {path}: 无法找到有效的 revision")
                          continue

                      # 统一处理 Git 仓库基础地址
                      git_base = f"https://android.googlesource.com/{name}"
                      
                      # 根据类型生成特定格式的下载 URL
                      if key == "clang":
                          final_url = f"{git_base}/+archive/{revision}.tar.gz"
                      elif key == "clang_tools":
                          # 匹配 bindgen 等工具所在的二进制目录
                          final_url = f"{git_base}/+archive/{revision}/linux-x86/bin.tar.gz"
                      elif key == "rust":
                          # 锁定 Android 16 对应的 1.81.0 目录
                          final_url = f"{git_base}/+archive/{revision}/linux-x86/1.81.0.tar.gz"

                      config["toolchains"][key] = {
                          "revision": revision,
                          "url": final_url,
                          "source_repo": name
                      }

              # 写入文件
              with open('toolchain.json', 'w', encoding='utf-8') as f:
                  json.dump(config, f, indent=2, ensure_ascii=False)
              
              print("JSON 生成成功!")
              print(json.dumps(config, indent=2))

          if __name__ == "__main__":
              generate_json()

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [[ -n "$(git status --porcelain toolchain.json)" ]]; then
            git add toolchain.json
            git commit -m "chore: 自动同步 Android 16 工具链配置"
            git push
          else
            echo "没有检测到内容变动。"
          fi

      - name: Cleanup
        if: always()
        run: rm -f manifest.xml
