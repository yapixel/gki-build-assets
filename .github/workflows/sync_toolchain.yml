name: Parse and Sync Manifest

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: 'Manifest Branch'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  parse-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Manifest
        run: |
          TAG="${{ inputs.manifest_branch }}"
          URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/${TAG}/default.xml?format=TEXT"
          curl -fsL --retry 5 "$URL" | base64 -d > manifest.xml

      - name: Pure Hash Tracking Parse
        id: resolve
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os, requests, base64, re, json, subprocess

          # 1. 强制获取 40 位静态哈希
          def get_static_hash(repo_name, rev):
              if re.match(r'^[0-9a-f]{40}$', rev): return rev
              url = f"https://android.googlesource.com/{repo_name}"
              try:
                  out = subprocess.check_output(["git", "ls-remote", url, rev]).decode()
                  return out.split()[0]
              except: return rev

          tree = ET.parse('manifest.xml')
          root = tree.getroot()
          default_tag = root.find('default')
          default_rev = default_tag.get('revision', '') if default_tag is not None else ""

          targets = {
              "common": "kernel",
              "prebuilts/clang/host/linux-x86": "clang",
              "prebuilts/rust": "rust",
              "prebuilts/clang-tools": "tools"
          }

          projects = {}
          for proj in root.findall('project'):
              path = proj.get('path')
              if path in targets:
                  name = proj.get('name')
                  rev = proj.get('revision') or default_rev
                  # 核心：只跟踪 Hash
                  h = get_static_hash(name, rev)
                  projects[targets[path]] = {"name": name, "hash": h}

          def fetch_text(repo, rev, path=""):
              url = f"https://android.googlesource.com/{repo}/+/{rev}/{path}?format=TEXT"
              r = requests.get(url, timeout=15)
              return base64.b64decode(r.text).decode('utf-8', errors='ignore') if r.status_code == 200 else ""

          # 2. 从哈希中实地解析数据
          # 内核版本
          k = projects['kernel']
          mk = fetch_text(k['name'], k['hash'], "Makefile")
          v = re.search(r'^VERSION\s*=\s*(\d+)', mk, re.M).group(1)
          p = re.search(r'^PATCHLEVEL\s*=\s*(\d+)', mk, re.M).group(1)
          s = re.search(r'^SUBLEVEL\s*=\s*(\d+)', mk, re.M).group(1)
          k_ver = f"{v}.{p}.{s}"

          # Clang 版本 (Build ID)
          c = projects['clang']
          c_info = fetch_text(c['name'], c['hash'])
          c_ver = re.search(r'r\d+[a-z]?', c_info).group(0)

          # Rust 版本 (不管版本号，只抓那个哈希下存在的文件夹)
          r = projects['rust']
          ls_tree = fetch_text(r['name'], r['hash'], "linux-x86/")
          # 提取目录下所有 x.y.z 文件夹，选那个哈希点上最新的
          versions = sorted(re.findall(r'(\d+\.\d+\.\d+)', ls_tree), key=lambda x: [int(i) for i in x.split('.')])
          rust_ver = versions[-1] if versions else "unknown"

          # 3. 构造 100% 锁死的 JSON
          data = {
              "manifest_tag": "${{ inputs.manifest_branch }}",
              "kernel_version": k_ver,
              "clang_version": c_ver,
              "rust_version": rust_ver,
              "kernel": { 
                  "revision": k['hash'], 
                  "url": f"https://android.googlesource.com/{k['name']}/+archive/{k['hash']}.tar.gz" 
              },
              "clang": { 
                  "revision": c['hash'], 
                  "url": f"https://android.googlesource.com/{c['name']}/+archive/{c['hash']}.tar.gz" 
              },
              "rust": { 
                  "revision": r['hash'], 
                  "url": f"https://android.googlesource.com/{r['name']}/+archive/{r['hash']}/linux-x86/{rust_ver}.tar.gz" 
              },
              "clang_tools": { 
                  "revision": projects['tools']['hash'], 
                  "url": f"https://android.googlesource.com/{projects['tools']['name']}/+archive/{projects['tools']['hash']}/linux-x86/bin.tar.gz" 
              }
          }

          with open('toolchains.json', 'w') as f:
              json.dump(data, f, indent=2)

      - name: Commit and Push to Root
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "VersionTracker"
          git add toolchains.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Sync toolchains to static hash: ${{ inputs.manifest_branch }}"
            git push
          fi
