name: AOSP Toolchain Sync

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests lxml

      - name: Raw Logic Extraction
        run: |
          python3 << 'EOF'
          import requests
          import base64
          import json
          import sys
          import re
          import subprocess
          from lxml import etree

          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def fetch_raw(repo, commit, path):
              if not commit or not path:
                  return ""
              
              # 判断是否为完整的 40 位 commit hash
              if re.fullmatch(r'[0-9a-f]{40}', commit):
                  url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
              else:
                  # 尝试作为 tag
                  url = f"{base_url}/{repo}/+/refs/tags/{commit}/{path}?format=TEXT"
              
              try:
                  r = requests.get(url, timeout=30)
                  if r.status_code != 200:
                      return ""
                  text = r.text.strip()
                  if not text:
                      return ""
                  # 直接尝试 Base64 解码
                  decoded = base64.b64decode(text).decode('utf-8', errors='ignore')
                  return decoded
              except Exception as e:
                  print(f"ERROR fetching {url}: {e}")
                  return ""

          def get_commit_hash(repo, rev):
              """通过 git ls-remote 获取 commit hash"""
              url = f"https://android.googlesource.com/{repo}"
              try:
                  result = subprocess.run(['git', 'ls-remote', url, rev], capture_output=True, text=True, timeout=30)
                  if result.stdout:
                      lines = result.stdout.strip().split()
                      if lines:
                          return lines[0]
              except Exception as e:
                  print(f"ERROR getting hash for {repo} {rev}: {e}")
              return rev

          # 1. 获取 manifest
          m_raw = fetch_raw("kernel/manifest", tag, "default.xml")
          if not m_raw:
              print(f"CRITICAL: Cannot fetch manifest for {tag}")
              sys.exit(1)
          
          print(f"DEBUG: manifest length={len(m_raw)}")
          
          root = etree.fromstring(m_raw.encode('utf-8'))
          default_elem = root.find('default')
          def_rev = default_elem.get('revision') if default_elem is not None else ""
          
          project_map = {}
          for p in root.findall('project'):
              path = p.get('path')
              if not path:
                  continue
              project_map[path] = {
                  "repo": p.get('name'),
                  "rev": p.get('revision') or def_rev
              }
          
          def get_val(text, key):
              for line in text.splitlines():
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if line.startswith(f"{key}=") or line.startswith(f"{key} ="):
                      val = line.split('=', 1)[1].split('#')[0].strip()
                      return val.strip('"').strip("'")
              return ""
          
          common = project_map.get("common")
          if not common:
              print("CRITICAL: common project not found")
              sys.exit(1)
          
          print(f"DEBUG: common rev={common['rev']}")
          
          # 获取 common 仓库的实际 commit hash
          common_hash = get_commit_hash(common['repo'], common['rev'])
          print(f"DEBUG: common hash={common_hash}")
          
          mk_text = fetch_raw(common['repo'], common_hash, "Makefile")
          const_text = fetch_raw(common['repo'], common_hash, "build.config.constants")
          
          print(f"DEBUG: mk_text length={len(mk_text)}")
          print(f"DEBUG: const_text length={len(const_text)}")
          
          # 打印前几行用于调试
          if mk_text:
              print(f"DEBUG: mk_text preview={mk_text[:200]}")
          if const_text:
              print(f"DEBUG: const_text preview={const_text[:200]}")
          
          rust_v = get_val(const_text, "RUSTC_VERSION")
          clang_v = get_val(const_text, "CLANG_VERSION")
          branch = get_val(const_text, "BRANCH")
          
          ver = get_val(mk_text, "VERSION")
          patch = get_val(mk_text, "PATCHLEVEL")
          sub = get_val(mk_text, "SUBLEVEL")
          kernel_ver = f"{ver}.{patch}.{sub}" if sub else f"{ver}.{patch}"
          
          print(f"DEBUG: rust_v={rust_v}, clang_v={clang_v}, branch={branch}")
          print(f"DEBUG: kernel_ver={kernel_ver}")
          
          # 获取工具链仓库的实际 commit hash
          clang_item = project_map.get("prebuilts/clang/host/linux-x86")
          rust_item = project_map.get("prebuilts/rust")
          tools_item = project_map.get("prebuilts/clang-tools")
          
          clang_hash = get_commit_hash(clang_item['repo'], clang_item['rev']) if clang_item else ""
          rust_hash = get_commit_hash(rust_item['repo'], rust_item['rev']) if rust_item else ""
          tools_hash = get_commit_hash(tools_item['repo'], tools_item['rev']) if tools_item else ""
          
          print(f"DEBUG: clang_hash={clang_hash}")
          print(f"DEBUG: rust_hash={rust_hash}")
          print(f"DEBUG: tools_hash={tools_hash}")
          
          def build_art(path, sub_path=""):
              item = project_map.get(path)
              if not item:
                  return {"revision": "", "url": ""}
              rev = item['rev']
              if path == "common":
                  rev_display = tag
              else:
                  rev_display = rev
              # 对于工具链，需要使用实际 hash 来构造下载 URL
              if path == "common":
                  download_rev = common_hash
              elif path == "prebuilts/clang/host/linux-x86":
                  download_rev = clang_hash
              elif path == "prebuilts/rust":
                  download_rev = rust_hash
              elif path == "prebuilts/clang-tools":
                  download_rev = tools_hash
              else:
                  download_rev = rev
              return {
                  "revision": rev_display,
                  "url": f"{base_url}/{item['repo']}/+archive/{download_rev}{sub_path}.tar.gz"
              }
          
          result = {
              "manifest_tag": tag,
              "kernel_info": {
                  "official_branch": branch,
                  "real_version": kernel_ver,
                  "clang_version": clang_v,
                  "rust_version": rust_v
              },
              "artifacts": {
                  "kernel": build_art("common"),
                  "clang": build_art("prebuilts/clang/host/linux-x86", f"/clang-{clang_v}"),
                  "rust": build_art("prebuilts/rust", f"/linux-x86/{rust_v}"),
                  "clang_tools": build_art("prebuilts/clang-tools", "/linux-x86/bin")
              }
          }
          
          with open('toolchains.json', 'w') as f:
              json.dump(result, f, indent=2)
          
          print("SUCCESS: toolchains.json generated")
          EOF

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat toolchains.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add toolchains.json
          git commit -m "Sync: ${{ github.event.inputs.manifest_tag }}" || echo "No changes to commit"
          git push