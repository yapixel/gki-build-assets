name: AOSP Toolchain Sync (Perl Power Mode)

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve and Extraction
        shell: bash
        run: |
          TAG="${{ github.event.inputs.manifest_tag }}"
          BASE="https://android.googlesource.com"

          # 1. 物理定位函数 (Base64 解码并移除 \r 防止干扰)
          fetch_raw() {
            curl -s "$BASE/$1/+/$2/$3?format=TEXT" | base64 -d | tr -d '\r'
          }

          # 锁定 Manifest
          M_RAW=$(fetch_raw "kernel/manifest" "refs/heads/$TAG" "default.xml")
          COMMON_HASH=$(echo "$M_RAW" | grep 'path="common"' | perl -ne 'print $1 if /revision="([^"]+)"/')
          [ -z "$COMMON_HASH" ] && COMMON_HASH="android16-6.12"

          # 2. 抓取物理文件
          fetch_raw "kernel/common" "$COMMON_HASH" "Makefile" > Makefile
          fetch_raw "kernel/common" "$COMMON_HASH" "build.config.constants" > constants

          # 3. 【核心】Perl 暴力提取：哪怕带了点号、补丁号、注释，也全部精准带走
          get_val() {
            # 逻辑：匹配行首 KEY，跳过等号和空白，抓取非空白、非引号、非井号的部分
            perl -ne "print \$1 if /^\s*$1\s*=\s*['\"]?([^'\"#\s]+)/" "$2"
          }

          RUST_V=$(get_val "RUSTC_VERSION" "constants")
          CLANG_V=$(get_val "CLANG_VERSION" "constants")
          BRANCH=$(get_val "BRANCH" "constants")
          
          V=$(get_val "VERSION" "Makefile")
          P=$(get_val "PATCHLEVEL" "Makefile")
          S=$(get_val "SUBLEVEL" "Makefile")
          KERNEL_V="${V}.${P}.${S}"

          # 4. 获取 Artifact 哈希
          get_repo_hash() {
             git ls-remote "$BASE/$1" "refs/heads/main" | awk '{print $1}'
          }

          # 构造最终 JSON
          cat <<EOF > toolchains.json
          {
            "manifest_tag": "$TAG",
            "kernel_info": {
              "official_branch": "$BRANCH",
              "real_version": "$KERNEL_V",
              "clang_version": "$CLANG_V",
              "rust_version": "$RUST_V"
            },
            "artifacts": {
              "kernel": { "revision": "$COMMON_HASH", "url": "$BASE/kernel/common/+archive/$COMMON_HASH.tar.gz" },
              "clang": { "url": "$BASE/platform/prebuilts/clang/host/linux-x86/+archive/$(get_repo_hash "platform/prebuilts/clang/host/linux-x86")/clang-$CLANG_V.tar.gz" },
              "rust": { "url": "$BASE/platform/prebuilts/rust/+archive/$(get_repo_hash "platform/prebuilts/rust")/linux-x86/$RUST_V.tar.gz" }
            }
          }
          EOF

      - name: Commit and Push
        run: |
          # 物理检查：如果 JSON 里没有后缀，直接在日志里报警
          RUST_V=$(jq -r '.kernel_info.rust_version' toolchains.json)
          echo "Checked Rust Version: $RUST_V"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add toolchains.json
          git commit -m "Sync: ${{ github.event.inputs.manifest_tag }} (Rust: $RUST_V)" || exit 0
          git push
