name: AOSP Toolchain Sync (Fixed Logic)

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Environment
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import requests
          import base64
          import json
          import sys

          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def fetch_raw(repo, commit, path):
              url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
              r = requests.get(url)
              if r.status_code == 200:
                  return base64.b64decode(r.text).decode('utf-8', errors='ignore')
              return ""

          # 1. 物理对齐：使用 XML 解析器，拒绝用正则抓哈希
          manifest_xml = fetch_raw("kernel/manifest", f"refs/heads/{tag}", "default.xml")
          if not manifest_xml: sys.exit("Manifest not found")
          
          root = ET.fromstring(manifest_xml)
          default_rev = root.find('default').get('revision')

          # 建立 path -> {repo, revision} 的映射
          projects = {}
          for p in root.findall('project'):
              projects[p.get('path')] = {
                  "repo": p.get('name'),
                  "rev": p.get('revision') or default_rev
              }

          # 2. 目标路径列表
          targets = ["common", "prebuilts/clang/host/linux-x86", "prebuilts/rust", "prebuilts/clang-tools"]
          
          # 3. 提取函数：不加戏，只认等号右边的内容
          def get_raw_val(text, key):
              for line in text.splitlines():
                  clean_line = line.strip()
                  if clean_line.startswith(f"{key}=") or clean_line.startswith(f"{key} ="):
                      # 拿到等号后的所有字符，去掉引号和注释
                      val = clean_line.split('=', 1)[1].split('#')[0].strip()
                      return val.strip('"').strip("'")
              return "UNKNOWN"

          common_info = projects.get("common")
          mk_text = fetch_raw(common_info['repo'], common_info['rev'], "Makefile")
          const_text = fetch_raw(common_info['repo'], common_info['rev'], "build.config.constants")

          rust_v = get_raw_val(const_text, "RUSTC_VERSION")
          clang_v = get_raw_val(const_text, "CLANG_VERSION")
          
          v = get_raw_val(mk_text, "VERSION")
          p = get_raw_val(mk_text, "PATCHLEVEL")
          s = get_raw_val(mk_text, "SUBLEVEL")

          # 4. 构造 artifacts (解决之前 revision 丢失的问题)
          def build_art(path, suffix=""):
              p_info = projects.get(path)
              if not p_info: return {"revision": "NOT_FOUND", "url": ""}
              repo = p_info['repo']
              rev = p_info['rev']
              url = f"{base_url}/{repo}/+archive/{rev}{suffix}.tar.gz"
              return {"revision": rev, "url": url}

          res = {
              "manifest_tag": tag,
              "kernel_info": {
                  "official_branch": get_raw_val(const_text, "BRANCH"),
                  "real_version": f"{v}.{p}.{s}".replace("UNKNOWN", "0"),
                  "clang_version": clang_v,
                  "rust_version": rust_v
              },
              "artifacts": {
                  "kernel": build_art("common"),
                  "clang": build_art("prebuilts/clang/host/linux-x86", f"/clang-{clang_v}"),
                  "rust": build_art("prebuilts/rust", f"/linux-x86/{rust_v}"),
                  "clang_tools": build_art("prebuilts/clang-tools", "/linux-x86/bin")
              }
          }

          with open('toolchains.json', 'w') as f:
              json.dump(res, f, indent=2)

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add toolchains.json
          git commit -m "Sync: ${{ github.event.inputs.manifest_tag }}" || exit 0
          git push
