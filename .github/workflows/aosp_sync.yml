name: AOSP Toolchain Real-Time Sync

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'Target Manifest Tag (e.g., common-android16-6.12-2025-06)'
        required: true
        default: 'common-android16-6.12-2025-06'

jobs:
  resolve-truth:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Resolve
        shell: python
        run: |
          import requests, base64, re, json, subprocess

          tag = "${{ github.event.inputs.manifest_tag }}"
          base = "https://android.googlesource.com"

          def fetch_txt(repo, rev, path):
              url = f"{base}/{repo}/+/{rev}/{path}?format=TEXT"
              r = requests.get(url)
              return base64.b64decode(r.text).decode('utf-8') if r.status_code == 200 else ""

          def get_hash(repo, rev):
              url = f"{base}/{repo}"
              return subprocess.check_output(["git", "ls-remote", url, rev]).decode().split()[0]

          # 1. 解析 Manifest 锁定哈希 (2025-06 节点)
          m_xml = fetch_txt("kernel/manifest", f"refs/heads/{tag}", "default.xml")
          # 这里通过正则或 XML 解析拿到 common 仓库的 revision 
          # 假设已经拿到了 kernel_rev (对应 android16-6.12)
          kernel_hash = get_hash("kernel/common", "android16-6.12") 

          # 2. 远程读取真理 (Makefile & Constants)
          makefile = fetch_txt("kernel/common", kernel_hash, "Makefile")
          constants = fetch_txt("kernel/common", kernel_hash, "build.config.constants")

          # --- 提取内核物理版本 (6.12.x) ---
          def m_val(k, t): return re.search(rf'^{k}\s*=\s*(\d+)', t, re.M).group(1)
          real_ver = f"{m_val('VERSION', makefile)}.{m_val('PATCHLEVEL', makefile)}.{m_val('SUBLEVEL', makefile)}"

          # --- 提取工具链契约 (rXXXX, 1.x.x.p1) ---
          def c_val(k, t): return re.search(rf'^{k}=["\']?([^\s"\']+)["\']?$', t, re.M).group(1)
          off_branch = c_val("BRANCH", constants)
          clang_v = c_val("CLANG_VERSION", constants)
          rust_v = c_val("RUSTC_VERSION", constants)

          # 3. 构造 100% 物理对齐的 JSON
          # ... 此处生成 JSON 逻辑与之前一致，关键是 rust_v 绝不修剪 ...
