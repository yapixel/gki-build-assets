name: AOSP Toolchain Sync

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Raw Logic Extraction
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import requests
          import base64
          import json
          import sys

          # 1. 配置物理参数
          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def fetch_raw(repo, commit, path):
              url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
              try:
                  r = requests.get(url, timeout=20)
                  if r.status_code == 200:
                      return base64.b64decode(r.text).decode('utf-8', errors='ignore')
              except: pass
              return ""

          # 2. 采样 Manifest (XML 物理树)
          m_raw = fetch_raw("kernel/manifest", f"refs/heads/{tag}", "default.xml")
          if not m_raw:
              print(f"CRITICAL ERROR: Manifest for {tag} not found.")
              sys.exit(1)
          
          root = ET.fromstring(m_raw)
          def_rev = root.find('default').get('revision') if root.find('default') is not None else ""

          # 建立 path -> {repo, rev} 映射，解析出什么就是什么
          project_map = {
              p.get('path'): {
                  "repo": p.get('name'),
                  "rev": p.get('revision') or def_rev
              } for p in root.findall('project') if p.get('path')
          }

          # 3. 物理切片提取 (不做任何补全或修正)
          def get_val(text, key):
              for line in text.splitlines():
                  line = line.strip()
                  if line.startswith(f"{key}=") or line.startswith(f"{key} ="):
                      # 抓取等号后、注释前的内容，保留所有原始后缀
                      val = line.split('=', 1)[1].split('#')[0].strip()
                      return val.strip('"').strip("'")
              return "NOT_FOUND"

          common = project_map.get("common")
          if not common:
              print("CRITICAL ERROR: 'common' repository not defined in manifest.")
              sys.exit(1)

          mk_text = fetch_raw(common['repo'], common['rev'], "Makefile")
          const_text = fetch_raw(common['repo'], common['rev'], "build.config.constants")

          # 4. 构建输出 (拒绝凑数据)
          rust_v = get_val(const_text, "RUSTC_VERSION")
          clang_v = get_val(const_text, "CLANG_VERSION")

          def build_artifact(path, suffix=""):
              item = project_map.get(path)
              if not item: return {"revision": "MISSING", "url": ""}
              # 只有当 revision 存在时才拼接 URL，不使用分支名顶替
              rev = item['rev']
              return {
                  "revision": rev,
                  "url": f"{base_url}/{item['repo']}/+archive/{rev}{suffix}.tar.gz"
              }

          result = {
              "manifest_tag": tag,
              "kernel_info": {
                  "official_branch": get_val(const_text, "BRANCH"),
                  "real_version": f"{get_val(mk_text, 'VERSION')}.{get_val(mk_text, 'PATCHLEVEL')}.{get_val(mk_text, 'SUBLEVEL')}".replace("NOT_FOUND", "0"),
                  "clang_version": clang_v,
                  "rust_version": rust_v
              },
              "artifacts": {
                  "kernel": build_artifact("common"),
                  "clang": build_artifact("prebuilts/clang/host/linux-x86", f"/clang-{clang_v}"),
                  "rust": build_artifact("prebuilts/rust", f"/linux-x86/{rust_v}"),
                  "clang_tools": build_artifact("prebuilts/clang-tools", "/linux-x86/bin")
              }
          }

          with open('toolchains.json', 'w') as f:
              json.dump(result, f, indent=2)
          print("Extraction complete. Logic verified.")

      - name: Commit and Push
        run: |
          cat toolchains.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add toolchains.json
          git commit -m "Sync: ${{ github.event.inputs.manifest_tag }}" || exit 0
          git push
