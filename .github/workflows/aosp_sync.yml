name: AOSP Toolchain Sync (HEAD Mode)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'AOSP Kernel Branch'
        required: true
        default: 'android16-6.12'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve and Extraction
        shell: bash
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          BASE="https://android.googlesource.com"

          # 1. 物理抓取：直接抓取分支最顶端的文件
          fetch_head() {
            curl -s "$BASE/$1/+/$BRANCH/$2?format=TEXT" | base64 -d | tr -d '\r'
          }

          # 2. 现场采样
          fetch_head "kernel/common" "Makefile" > Makefile
          fetch_head "kernel/common" "build.config.constants" > constants

          # 3. Perl 强力提取
          get_val() {
            perl -ne "print \$1 if /^\s*$1\s*=\s*['\"]?([^'\"#\s]+)/" "$2"
          }

          RUST_V=$(get_val "RUSTC_VERSION" "constants")
          CLANG_V=$(get_val "CLANG_VERSION" "constants")
          
          V=$(get_val "VERSION" "Makefile")
          P=$(get_val "PATCHLEVEL" "Makefile")
          S=$(get_val "SUBLEVEL" "Makefile")
          KERNEL_V="${V}.${P}.${S}"

          # 获取此时此刻分支的最新哈希
          HEAD_HASH=$(git ls-remote "$BASE/kernel/common" "refs/heads/$BRANCH" | awk '{print $1}')

          # 4. 构造 JSON
          cat <<EOF > toolchains.json
          {
            "manifest_tag": "HEAD-$BRANCH",
            "kernel_info": {
              "official_branch": "$BRANCH",
              "real_version": "$KERNEL_V",
              "clang_version": "$CLANG_V",
              "rust_version": "$RUST_V"
            },
            "artifacts": {
              "kernel": { "revision": "$HEAD_HASH", "url": "$BASE/kernel/common/+archive/$HEAD_HASH.tar.gz" },
              "rust": { "url": "$BASE/platform/prebuilts/rust/+archive/$(git ls-remote "$BASE/platform/prebuilts/rust" "refs/heads/main" | awk '{print $1}')/linux-x86/$RUST_V.tar.gz" }
            }
          }
          EOF

      - name: Commit and Push
        run: |
          RUST_V=$(jq -r '.kernel_info.rust_version' toolchains.json)
          echo "Current Branch Rust Version: $RUST_V"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add toolchains.json
          git commit -m "Sync HEAD: $RUST_V" || exit 0
          git push
