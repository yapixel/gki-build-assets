name: AOSP Toolchain Sync (Zero-Hardcode)

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Resolve AOSP Toolchains
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import requests
          import base64
          import re
          import json
          import subprocess
          import os

          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def get_hash(repo, rev):
              url = f"{base_url}/{repo}"
              try:
                  # Use ls-remote to get the definitive 40-char commit hash for the given revision
                  result = subprocess.check_output(["git", "ls-remote", url, rev]).decode().split()[0]
                  return result
              except Exception as e:
                  print(f"Error resolving hash for {repo}: {e}")
                  # Fallback to the rev if hash resolution fails (though this shouldn't happen with correct revs)
                  return rev

          def fetch_raw(repo, commit, path):
              url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
              r = requests.get(url)
              if r.status_code == 200:
                  return base64.b64decode(r.text).decode('utf-8', errors='ignore')
              return ""

          # 1. Fetch and Parse Manifest
          print(f"[*] Fetching manifest for tag: {tag}")
          m_raw = fetch_raw("kernel/manifest", f"refs/heads/{tag}", "default.xml")
          if not m_raw:
              raise Exception(f"Failed to fetch manifest for {tag}")
          
          root = ET.fromstring(m_raw)
          def_rev = root.find('default').get('revision')

          # Map of path in local tree to simplified keys
          mapping = {
              "common": "kernel",
              "prebuilts/clang/host/linux-x86": "clang",
              "prebuilts/rust": "rust",
              "prebuilts/clang-tools": "tools"
          }
          
          nodes = {}
          for p in root.findall('project'):
              path = p.get('path')
              if path in mapping:
                  name = p.get('name')
                  rev = p.get('revision') or def_rev
                  nodes[mapping[path]] = {"name": name, "rev": rev}

          # 2. Convert revisions/branches to physical Commit Hashes
          for key in nodes:
              print(f"[*] Resolving physical hash for {key} ({nodes[key]['name']})...")
              nodes[key]["hash"] = get_hash(nodes[key]["name"], nodes[key]["rev"])

          # 3. Pull Ground Truth from build.config.constants
          k = nodes['kernel']
          print(f"[*] Reading build.config.constants from kernel @ {k['hash'][:8]}")
          constants = fetch_raw(k['name'], k['hash'], "build.config.constants")
          
          # Strictly extract: BRANCH, CLANG_VERSION, RUSTC_VERSION from the source code
          try:
              off_branch = re.search(r'BRANCH=([^\s]+)', constants).group(1)
              clang_v = re.search(r'CLANG_VERSION=([^\s]+)', constants).group(1)
              rust_v = re.search(r'RUSTC_VERSION=([^\s]+)', constants).group(1)
          except Exception as e:
              raise Exception(f"Failed to parse build.config.constants: {e}")

          # Timestamp logic: Extracting the date suffix from the input tag (e.g., 2025-06)
          tag_parts = tag.split('-')
          time_stamp = "-".join(tag_parts[-2:]) if len(tag_parts) >= 2 else tag

          # 4. Construct toolchains.json following AOSP conventions
          result = {
              "manifest_tag": tag,
              "config": {
                  "official_branch": off_branch,
                  "clang_version": clang_v,
                  "rust_version": rust_v
              },
              "artifacts": {
                  "kernel": {
                      "revision": k['hash'],
                      "url": f"{base_url}/{k['name']}/+archive/{k['hash']}.tar.gz",
                      "official_name": f"{off_branch}-{time_stamp}.tar.gz"
                  },
                  "clang": {
                      "revision": nodes['clang']['hash'],
                      "url": f"{base_url}/{nodes['clang']['name']}/+archive/{nodes['clang']['hash']}/clang-{clang_v}.tar.gz"
                  },
                  "rust": {
                      "revision": nodes['rust']['hash'],
                      "url": f"{base_url}/{nodes['rust']['name']}/+archive/{nodes['rust']['hash']}/linux-x86/{rust_v}.tar.gz"
                  },
                  "clang_tools": {
                      "revision": nodes['tools']['hash'],
                      "url": f"{base_url}/{nodes['tools']['name']}/+archive/{nodes['tools']['hash']}/linux-x86/bin.tar.gz"
                  }
              }
          }

          # Save formatted JSON
          with open('toolchains.json', 'w') as f:
              json.dump(result, f, indent=2)
          
          print(f"[!] toolchains.json generated. Official name: {result['artifacts']['kernel']['official_name']}")

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add toolchains.json
          git commit -m "Sync AOSP toolchains for ${{ github.event.inputs.manifest_tag }}" || exit 0
          git push
