name: AOSP Toolchain Sync

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests lxml

      - name: Raw Logic Extraction
        shell: python
        run: |
          import requests
          import base64
          import json
          import sys
          import re
          from lxml import etree

          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def fetch_raw(repo, commit, path):
              """获取 AOSP 文件内容，支持 commit hash、tag、branch"""
              if not commit or not path:
                  return ""
              
              print(f"DEBUG: fetch_raw called with repo={repo}, commit={commit}, path={path}")
              
              # 判断是否为完整的 40 位 commit hash
              if re.fullmatch(r'[0-9a-f]{40}', commit):
                  url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
                  print(f"DEBUG: hash mode url={url}")
                  try:
                      r = requests.get(url, timeout=30)
                      print(f"DEBUG: status={r.status_code}")
                      if r.status_code == 200:
                          text = r.text.strip()
                          print(f"DEBUG: content preview={text[:100]}")
                          if text and (text.startswith('PD94bWwg') or text.startswith('IyEg')):
                              return base64.b64decode(text).decode('utf-8', errors='ignore')
                  except Exception as e:
                      print(f"DEBUG: exception={e}")
                  return ""
              
              # 尝试作为 tag 获取
              url = f"{base_url}/{repo}/+/refs/tags/{commit}/{path}?format=TEXT"
              print(f"DEBUG: tag mode url={url}")
              try:
                  r = requests.get(url, timeout=30)
                  print(f"DEBUG: status={r.status_code}")
                  if r.status_code == 200:
                      text = r.text.strip()
                      print(f"DEBUG: content preview={text[:100]}")
                      if text and (text.startswith('PD94bWwg') or text.startswith('IyEg')):
                          return base64.b64decode(text).decode('utf-8', errors='ignore')
              except Exception as e:
                  print(f"DEBUG: exception={e}")
              
              # 尝试作为分支获取
              url = f"{base_url}/{repo}/+/refs/heads/{commit}/{path}?format=TEXT"
              print(f"DEBUG: branch mode url={url}")
              try:
                  r = requests.get(url, timeout=30)
                  print(f"DEBUG: status={r.status_code}")
                  if r.status_code != 200:
                      return ""
                  text = r.text.strip()
                  print(f"DEBUG: content preview={text[:100]}")
                  if not text:
                      return ""
                  if not (text.startswith('PD94bWwg') or text.startswith('IyEg')):
                      return ""
                  return base64.b64decode(text).decode('utf-8', errors='ignore')
              except Exception as e:
                  print(f"DEBUG: exception={e}")
                  return ""

          # 1. 获取 manifest
          m_raw = fetch_raw("kernel/manifest", tag, "default.xml")
          if not m_raw:
              print(f"CRITICAL: Manifest for {tag} not found.")
              sys.exit(1)

          # 使用 lxml 解析 manifest
          root = etree.fromstring(m_raw.encode('utf-8'))
          
          default_elem = root.find('default')
          def_rev = default_elem.get('revision') if default_elem is not None else ""

          # 建立 path -> {repo, rev} 映射
          project_map = {}
          for p in root.findall('project'):
              path = p.get('path')
              if not path:
                  continue
              project_map[path] = {
                  "repo": p.get('name'),
                  "rev": p.get('revision') or def_rev
              }

          # 2. 提取 key=value
          def get_val(text, key):
              for line in text.splitlines():
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if line.startswith(f"{key}=") or line.startswith(f"{key} ="):
                      val = line.split('=', 1)[1].split('#')[0].strip()
                      return val.strip('"').strip("'")
              return ""

          common = project_map.get("common")
          if not common:
              print("CRITICAL: 'common' project missing.")
              sys.exit(1)

          print(f"DEBUG: common repo={common['repo']}, rev={common['rev']}")

          mk_text = fetch_raw(common['repo'], common['rev'], "Makefile")
          const_text = fetch_raw(common['repo'], common['rev'], "build.config.constants")

          print(f"DEBUG: mk_text length={len(mk_text)}")
          print(f"DEBUG: const_text length={len(const_text)}")

          rust_v = get_val(const_text, "RUSTC_VERSION")
          clang_v = get_val(const_text, "CLANG_VERSION")
          branch = get_val(const_text, "BRANCH")

          ver = get_val(mk_text, "VERSION")
          patch = get_val(mk_text, "PATCHLEVEL")
          sub = get_val(mk_text, "SUBLEVEL")
          kernel_ver = f"{ver}.{patch}.{sub}" if sub else f"{ver}.{patch}"

          print(f"DEBUG: rust_v={rust_v}, clang_v={clang_v}, branch={branch}")
          print(f"DEBUG: ver={ver}, patch={patch}, sub={sub}")

          # 3. 构造 artifact 下载信息
          def build_art(path, sub_path=""):
              item = project_map.get(path)
              if not item:
                  return {"revision": "", "url": ""}
              rev = item['rev']
              if path == "common":
                  rev_display = tag
              else:
                  rev_display = rev
              return {
                  "revision": rev_display,
                  "url": f"{base_url}/{item['repo']}/+archive/{rev}{sub_path}.tar.gz"
              }

          result = {
              "manifest_tag": tag,
              "kernel_info": {
                  "official_branch": branch,
                  "real_version": kernel_ver,
                  "clang_version": clang_v,
                  "rust_version": rust_v
              },
              "artifacts": {
                  "kernel": build_art("common"),
                  "clang": build_art("prebuilts/clang/host/linux-x86", f"/clang-{clang_v}"),
                  "rust": build_art("prebuilts/rust", f"/linux-x86/{rust_v}"),
                  "clang_tools": build_art("prebuilts/clang-tools", "/linux-x86/bin")
              }
          }

          with open('toolchains.json', 'w') as f:
              json.dump(result, f, indent=2)
          print("Generated toolchains.json successfully.")
          print(json.dumps(result, indent=2))

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat toolchains.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add toolchains.json
          git commit -m "Sync: ${{ github.event.inputs.manifest_tag }}" || echo "No changes to commit"
          git push