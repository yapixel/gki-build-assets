name: AOSP Toolchain Sync (Final Logic)

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Resolve and Generate
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import requests
          import base64
          import json
          import sys

          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def fetch_raw(repo, commit, path):
              url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
              try:
                  r = requests.get(url, timeout=15)
                  if r.status_code == 200:
                      return base64.b64decode(r.text).decode('utf-8', errors='ignore')
              except Exception:
                  pass
              return ""

          # 1. 物理解析 Manifest (这是底线，绝不改用正则)
          m_raw = fetch_raw("kernel/manifest", f"refs/heads/{tag}", "default.xml")
          if not m_raw:
              sys.exit(f"CRITICAL: Manifest for {tag} is missing from Google servers.")
          
          root = ET.fromstring(m_raw)
          def_rev = root.find('default').get('revision') if root.find('default') is not None else ""

          project_map = {}
          for p in root.findall('project'):
              path = p.get('path')
              if path:
                  project_map[path] = {
                      "repo": p.get('name'),
                      "rev": p.get('revision') or def_rev
                  }

          # 2. 提取器：物理切割，拒绝截断
          def extract_val(text, key):
              for line in text.splitlines():
                  line = line.strip()
                  if line.startswith(f"{key}=") or line.startswith(f"{key} ="):
                      val = line.split('=', 1)[1].split('#')[0].strip()
                      return val.replace('"', '').replace("'", "")
              return "UNKNOWN"

          common = project_map.get("common")
          if not common: sys.exit("CRITICAL: 'common' path missing in manifest.")
          
          mk_text = fetch_raw(common['repo'], common['rev'], "Makefile")
          const_text = fetch_raw(common['repo'], common['rev'], "build.config.constants")

          rust_v = extract_val(const_text, "RUSTC_VERSION")
          clang_v = extract_val(const_text, "CLANG_VERSION")

          # 3. 构造 Artifacts (基于解析出的哈希)
          def get_art(path, sub_path=""):
              item = project_map.get(path)
              if not item: return {"revision": "NOT_FOUND", "url": "NOT_FOUND"}
              return {
                  "revision": item['rev'],
                  "url": f"{base_url}/{item['repo']}/+archive/{item['rev']}{sub_path}.tar.gz"
              }

          result = {
              "manifest_tag": tag,
              "kernel_info": {
                  "official_branch": extract_val(const_text, "BRANCH"),
                  "real_version": f"{extract_val(mk_text, 'VERSION')}.{extract_val(mk_text, 'PATCHLEVEL')}.{extract_val(mk_text, 'SUBLEVEL')}".replace("UNKNOWN", "0"),
                  "clang_version": clang_v,
                  "rust_version": rust_v
              },
              "artifacts": {
                  "kernel": get_art("common"),
                  "clang": get_art("prebuilts/clang/host/linux-x86", f"/clang-{clang_v}"),
                  "rust": get_art("prebuilts/rust", f"/linux-x86/{rust_v}"),
                  "clang_tools": get_art("prebuilts/clang-tools", "/linux-x86/bin")
              }
          }

          with open('toolchains.json', 'w') as f:
              json.dump(result, f, indent=2)

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add toolchains.json
          git commit -m "Sync: ${{ github.event.inputs.manifest_tag }}" || exit 0
          git push
