name: AOSP Toolchain Sync

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Resolve Environment (Strict Parsing)
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import requests
          import base64
          import re
          import json
          import subprocess
          import sys

          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def fetch_raw(repo, commit, path):
              url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
              r = requests.get(url)
              if r.status_code == 200:
                  return base64.b64decode(r.text).decode('utf-8', errors='ignore')
              return ""

          def get_hash(repo, rev):
              url = f"{base_url}/{repo}"
              try:
                  # 物理对齐：获取此时此刻该引用的 40 位死哈希
                  return subprocess.check_output(["git", "ls-remote", url, rev]).decode().split()[0]
              except:
                  return rev

          # 1. 解析 Manifest
          m_raw = fetch_raw("kernel/manifest", f"refs/heads/{tag}", "default.xml")
          if not m_raw:
              print(f"Error: Cannot find manifest for {tag}")
              sys.exit(1)

          root = ET.fromstring(m_raw)
          def_rev = root.find('default').get('revision')

          # 物理仓库映射（对应 AOSP 目录结构）
          mapping = {
              "common": "kernel/common",
              "prebuilts/clang/host/linux-x86": "platform/prebuilts/clang/host/linux-x86",
              "prebuilts/rust": "platform/prebuilts/rust",
              "prebuilts/clang-tools": "platform/prebuilts/clang-tools"
          }
          
          nodes = {}
          for p in root.findall('project'):
              path = p.get('path')
              if path in mapping:
                  nodes[path] = {
                      "repo": p.get('name'),
                      "hash": get_hash(p.get('name'), p.get('revision') or def_rev)
                  }

          # 2. 严格解析真理文件 (Makefile & Constants)
          def get_value_from_text(text, key, separator="="):
              """
              加固版提取逻辑：
              - 逐行扫描
              - 剥离 Shell 注释 (#)
              - 剥离所有引号 (" 或 ')
              - 物理还原所有字符（包含 .p1 等后缀）
              """
              for line in text.splitlines():
                  clean_line = line.strip()
                  if clean_line.startswith(f"{key}{separator}") or clean_line.startswith(f"{key} {separator}"):
                      parts = clean_line.split(separator, 1)
                      if len(parts) > 1:
                          val = parts[1].split('#')[0].strip() # 剥离注释
                          return val.replace('"', '').replace("'", "")
              return "unknown"

          # 提取 Makefile 版本 (6.12.x)
          mk_text = fetch_raw(nodes['common']['repo'], nodes['common']['hash'], "Makefile")
          real_ver = f"{get_value_from_text(mk_text, 'VERSION')}.{get_value_from_text(mk_text, 'PATCHLEVEL')}.{get_value_from_text(mk_text, 'SUBLEVEL')}"

          # 提取 Constants 契约 (rXXXX, 1.x.x.p1)
          const_text = fetch_raw(nodes['common']['repo'], nodes['common']['hash'], "build.config.constants")
          off_branch = get_value_from_text(const_text, "BRANCH")
          clang_v    = get_value_from_text(const_text, "CLANG_VERSION")
          rust_v     = get_value_from_text(const_text, "RUSTC_VERSION")

          # 3. 构造 100% 物理对齐的 JSON
          result = {
              "manifest_tag": tag,
              "kernel_info": {
                  "official_branch": off_branch,
                  "real_version": real_ver,
                  "clang_version": clang_v,
                  "rust_version": rust_v
              },
              "artifacts": {
                  "kernel": {
                      "revision": nodes['common']['hash'],
                      "url": f"{base_url}/{nodes['common']['repo']}/+archive/{nodes['common']['hash']}.tar.gz"
                  },
                  "clang": {
                      "revision": nodes['prebuilts/clang/host/linux-x86']['hash'],
                      "url": f"{base_url}/{nodes['prebuilts/clang/host/linux-x86']['repo']}/+archive/{nodes['prebuilts/clang/host/linux-x86']['hash']}/clang-{clang_v}.tar.gz"
                  },
                  "rust": {
                      "revision": nodes['prebuilts/rust']['hash'],
                      "url": f"{base_url}/{nodes['prebuilts/rust']['repo']}/+archive/{nodes['prebuilts/rust']['hash']}/linux-x86/{rust_v}.tar.gz"
                  },
                  "clang_tools": {
                      "revision": nodes['prebuilts/clang-tools']['hash'],
                      "url": f"{base_url}/{nodes['prebuilts/clang-tools']['repo']}/+archive/{nodes['prebuilts/clang-tools']['hash']}/linux-x86/bin.tar.gz"
                  }
              }
          }

          with open('toolchains.json', 'w') as f:
              json.dump(result, f, indent=2)

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add toolchains.json
          git commit -m "Sync: ${{ github.event.inputs.manifest_tag }} (Real: $(jq -r '.kernel_info.real_version' toolchains.json))" || exit 0
          git push
