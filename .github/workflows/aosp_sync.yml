name: AOSP Toolchain Sync (Evidence Mode)

on:
  workflow_dispatch:
    inputs:
      manifest_tag:
        description: 'AOSP Manifest Tag'
        required: true
        default: 'common-android16-6.12-2025-06'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Resolve Environment
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import requests
          import base64
          import re
          import json
          import subprocess
          import sys

          tag = "${{ github.event.inputs.manifest_tag }}"
          base_url = "https://android.googlesource.com"

          def fetch_raw(repo, commit, path):
              url = f"{base_url}/{repo}/+/{commit}/{path}?format=TEXT"
              r = requests.get(url)
              if r.status_code == 200:
                  # 还原原始文本
                  return base64.b64decode(r.text).decode('utf-8', errors='ignore')
              return ""

          # 1. 锁定哈希
          # ... (省略重复的 ls-remote 逻辑，直接进入关键点) ...
          m_raw = fetch_raw("kernel/manifest", f"refs/heads/{tag}", "default.xml")
          root = ET.fromstring(m_raw)
          def_rev = root.find('default').get('revision')
          
          # 获取 kernel/common 的物理哈希
          kernel_repo = ""
          for p in root.findall('project'):
              if p.get('path') == "common":
                  kernel_repo = p.get('name')
                  break
          
          target_hash = subprocess.check_output(["git", "ls-remote", f"{base_url}/{kernel_repo}", "android16-6.12"]).decode().split()[0]

          # 2. 【核心物证环节】获取并打印原始文本
          const_text = fetch_raw(kernel_repo, target_hash, "build.config.constants")
          
          print("="*50)
          print(f"DEBUG: RAW CONTENT OF build.config.constants (Hash: {target_hash})")
          print("-"*50)
          print(const_text) # 直接输出原始文本，哪怕有隐藏字符也能看到
          print("="*50)

          # 3. 严格提取
          def get_val(text, key):
              for line in text.splitlines():
                  if line.strip().startswith(f"{key}="):
                      return line.split('=', 1)[1].strip().strip('"').strip("'").split('#')[0].strip()
              return "NOT_FOUND"

          rust_v = get_val(const_text, "RUSTC_VERSION")
          print(f"DEBUG: EXTRACTED RUST_VERSION -> [{rust_v}]")

          # ... (后续生成 toolchains.json 的逻辑保持不变) ...
