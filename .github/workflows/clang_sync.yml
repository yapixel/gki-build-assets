name: Parse Clang Manifest

on:
  workflow_dispatch:
    inputs:
      manifest_url:
        description: 'Clang manifest URL (e.g. https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/refs/heads/main-kernel-2025/clang-r536225/manifest_14043575.xml?format=TEXT)'
        required: true
        type: string
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/refs/heads/main-kernel-2025/clang-r536225/manifest_14043575.xml?format=TEXT'

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download and parse Clang manifest
        id: parse
        run: |
          MANIFEST_URL="${{ github.event.inputs.manifest_url }}"
          echo "Downloading manifest from: $MANIFEST_URL"
          
          # 下载并解码
          curl -fsL --retry 5 "$MANIFEST_URL" | base64 -d > manifest.xml
          
          # 使用 Python 解析 XML，提取所有 project 信息
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import json
          import os
          import re
          
          tree = ET.parse('manifest.xml')
          root = tree.getroot()
          
          # 提取 default revision
          default = root.find('default')
          default_rev = default.get('revision') if default is not None else ""
          
          # 从 default_rev 中提取版本号 (如 llvm-r536225-release -> r536225)
          version_match = re.search(r'r(\d+)', default_rev)
          clang_version = f"r{version_match.group(1)}" if version_match else ""
          
          # 提取所有 project 信息
          projects = {}
          for project in root.findall('project'):
              path = project.get('path')
              name = project.get('name')
              revision = project.get('revision')
              
              if not revision:
                  revision = default_rev
              
              projects[path] = {
                  "name": name,
                  "revision": revision
              }
          
          # 重点关注的关键组件
          key_components = [
              "prebuilts/clang/host/linux-x86",
              "prebuilts/build-tools",
              "prebuilts/clang-tools",
              "toolchain/llvm-project",
              "toolchain/binutils"
          ]
          
          result = {
              "manifest_version": "14043575",
              "clang_version": clang_version,
              "default_revision": default_rev,
              "last_update": os.popen('date -u +"%Y-%m-%dT%H:%M:%SZ"').read().strip(),
              "components": projects
          }
          
          with open('clang-manifest.json', 'w') as f:
              json.dump(result, f, indent=2)
          
          print(f"Generated clang-manifest.json with {len(projects)} components")
          print(f"Clang version: {clang_version}")
          
          # 打印关键组件信息
          print("\nKey components:")
          for comp in key_components:
              if comp in projects:
                  print(f"  {comp}: {projects[comp]['revision'][:12]}...")
          EOF
          
          # 显示生成的 JSON 摘要
          echo "=== clang-manifest.json ==="
          jq '.manifest_version, .clang_version, .default_revision' clang-manifest.json

      - name: Commit and push JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add clang-manifest.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update clang-manifest.json"
          git push