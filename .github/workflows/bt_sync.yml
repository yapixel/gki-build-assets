name: Mirror MidoriKSU Build Tools

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'MidoriKSU build-tools download URL'
        required: true
        type: string
        default: 'https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0/build-tools.tar.gz'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download MidoriKSU build-tools
        run: |
          echo "Downloading from ${{ github.event.inputs.source_url }}"
          aria2c -s16 -x16 -k1M "${{ github.event.inputs.source_url }}" -o build-tools.tar.gz
          ls -lh build-tools.tar.gz
          
          # 验证包内容
          echo "Package contents (top level):"
          tar -tzf build-tools.tar.gz | head -20

      - name: Upload to gki-build-assets Release
        run: |
          TAG="r536225"
          FILE="build-tools.tar.gz"
          
          # 确保 Release 存在
          if gh release view "$TAG" --repo yapixel/gki-build-assets &>/dev/null; then
            echo "Release $TAG exists"
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --repo yapixel/gki-build-assets \
              --title "$TAG" \
              --notes "Toolchain components for $TAG"
          fi
          
          # 上传文件（覆盖已存在的）
          gh release upload "$TAG" "$FILE" \
            --repo yapixel/gki-build-assets \
            --clobber
          
          echo "Successfully uploaded $FILE to release $TAG"

      - name: Cleanup
        if: always()
        run: rm -f build-tools.tar.gz